<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FFC800">
<title>جايك</title>
<link rel="icon" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-family:'Segoe UI',Tahoma,sans-serif; }
  :root {
    --ink:#1A1A1A; --gold:#FFC800; --gold-dark:#E0AC00; --gold-light:#FFF7DE;
    --muted:#8A8270; --line:#F0E4C4;
  }
  body {
    background:linear-gradient(165deg,#FFFFFF 0%,#FFFBF0 55%,#FFF3D6 100%);
    color:var(--ink); min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px; text-align:center;
  }
  .logo {
    width:112px; height:112px; border-radius:26px; object-fit:cover;
    box-shadow:0 10px 24px rgba(26,26,26,.16);
    margin-bottom:22px;
  }
  .tag { font-size:15px; color:var(--muted); margin-bottom:44px; }

  .cards { display:flex; flex-direction:column; gap:16px; width:100%; max-width:360px; }
  .card {
    background:#fff; color:var(--ink); border:1.5px solid var(--line);
    border-radius:18px; padding:22px; text-decoration:none;
    display:flex; align-items:center; gap:16px;
    transition:transform .1s, box-shadow .1s;
    box-shadow:0 3px 14px rgba(26,26,26,.06);
  }
  .card:active { transform:translateY(2px); box-shadow:0 1px 6px rgba(26,26,26,.06); }
  .card .ic {
    width:56px; height:56px; border-radius:15px; background:var(--gold-light);
    display:flex; align-items:center; justify-content:center; font-size:30px; flex-shrink:0;
  }
  .card .tx { text-align:right; flex:1; }
  .card .tx h2 { font-size:18px; margin-bottom:3px; }
  .card .tx p { font-size:12.5px; color:var(--muted); line-height:1.5; }
  .card .arrow { color:var(--muted); font-size:22px; }

  .card.driver { background:var(--gold); border-color:var(--gold); color:var(--ink); box-shadow:0 3px 0 var(--gold-dark); }
  .card.driver:active { box-shadow:0 1px 0 var(--gold-dark); }
  .card.driver .ic { background:rgba(26,26,26,.08); }
  .card.driver .tx p { color:rgba(26,26,26,.65); }
  .card.driver .arrow { color:rgba(26,26,26,.55); }

  .foot { margin-top:40px; font-size:11px; color:#C9C0A6; text-decoration:none; }
</style>
</head>
<body>
  <img class="logo" src="/logo.png" alt="جايك">
  <div class="tag">وين ما تريد، جايك</div>

  <div class="cards">
    <a href="/ride" class="card">
      <div class="ic">🙋</div>
      <div class="tx">
        <h2>أنا زبون</h2>
        <p>احجز رحلة توصلك لأي مكان</p>
      </div>
      <div class="arrow">‹</div>
    </a>
    <a href="/driver" class="card driver">
      <div class="ic">🚗</div>
      <div class="tx">
        <h2>أنا سائق</h2>
        <p>استلم الطلبات وابدأ الشغل</p>
      </div>
      <div class="arrow">‹</div>
    </a>
  </div>

  <a href="/admin" class="foot">لوحة التحكم</a>
</body>
</html>
