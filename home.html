<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جايك</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-family:'Segoe UI',Tahoma,sans-serif; }
  :root {
    --ink:#0E2A3D; --sky:#2BA9E0; --sky-dark:#1B87B8; --sky-light:#E8F6FD;
    --muted:#7B96A6; --line:#DCEBF3;
  }
  body {
    background:linear-gradient(165deg,#FFFFFF 0%,#F0F9FE 55%,#E3F3FB 100%);
    color:var(--ink); min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px; text-align:center;
  }
  .logo-slot {
    width:104px; height:104px; background:var(--sky-light);
    border:2px dashed var(--sky); border-radius:28px;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:18px; font-size:12px; color:var(--sky-dark); padding:8px;
  }
  h1 { font-size:38px; margin-bottom:6px; color:var(--ink); }
  .tag { font-size:15px; color:var(--muted); margin-bottom:44px; }

  .cards { display:flex; flex-direction:column; gap:16px; width:100%; max-width:360px; }
  .card {
    background:#fff; color:var(--ink); border:1.5px solid var(--line);
    border-radius:18px; padding:22px; text-decoration:none;
    display:flex; align-items:center; gap:16px;
    transition:transform .1s, box-shadow .1s;
    box-shadow:0 3px 14px rgba(14,42,61,.06);
  }
  .card:active { transform:translateY(2px); box-shadow:0 1px 6px rgba(14,42,61,.06); }
  .card .ic {
    width:56px; height:56px; border-radius:15px; background:var(--sky-light);
    display:flex; align-items:center; justify-content:center; font-size:30px; flex-shrink:0;
  }
  .card .tx { text-align:right; flex:1; }
  .card .tx h2 { font-size:18px; margin-bottom:3px; }
  .card .tx p { font-size:12.5px; color:var(--muted); line-height:1.5; }
  .card .arrow { color:var(--muted); font-size:22px; }

  .card.driver { background:var(--sky); border-color:var(--sky); color:#fff; box-shadow:0 3px 0 var(--sky-dark); }
  .card.driver:active { box-shadow:0 1px 0 var(--sky-dark); }
  .card.driver .ic { background:rgba(255,255,255,.2); }
  .card.driver .tx p { color:rgba(255,255,255,.85); }
  .card.driver .arrow { color:rgba(255,255,255,.7); }

  .demo { margin-top:40px; font-size:12px; color:var(--muted); }
</style>
</head>
<body>
  <div class="logo-slot">مكان<br>اللوگو</div>
  <h1>جايك</h1>
  <div class="tag">تكتك يوصلك ويوصّل طلباتك</div>

  <div class="cards">
    <a href="/ride" class="card">
      <div class="ic">🙋</div>
      <div class="tx">
        <h2>أنا زبون</h2>
        <p>احجز تكتك يوصلك لأي مكان</p>
      </div>
      <div class="arrow">‹</div>
    </a>
    <a href="/driver" class="card driver">
      <div class="ic">🛺</div>
      <div class="tx">
        <h2>أنا سائق</h2>
        <p>استلم الطلبات وابدأ الشغل</p>
      </div>
      <div class="arrow">‹</div>
    </a>
  </div>

  <div class="demo">نسخة تجريبية — Jayak</div>
</body>
</html>
